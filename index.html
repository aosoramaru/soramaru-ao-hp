    <style>
        body{overflow:hidden}
        .hero-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:url('1周年イラスト.png') center center/cover no-repeat}
        .hero-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom,rgba(10,14,39,.1) 0%,rgba(10,14,39,.02) 30%,rgba(10,14,39,.35) 65%,rgba(10,14,39,.85) 100%)}
        .hero-wrap{position:relative;z-index:1;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .hero-center{position:relative;z-index:2;text-align:center;margin-bottom:40px}
        .hero-center .sub{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:8px;color:var(--gold);text-transform:uppercase;opacity:0;animation:slideUp 1s ease .3s forwards}
        .hero-center h1{font-family:'Orbitron',sans-serif;font-size:clamp(40px,7vw,80px);font-weight:900;letter-spacing:8px;margin:12px 0;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;animation:slideUp 1s ease .6s forwards}
        .hero-center .tagline{font-size:15px;letter-spacing:5px;color:rgba(240,240,245,.6);opacity:0;animation:slideUp 1s ease .9s forwards}
        .hero-social{position:absolute;left:40px;bottom:40px;display:flex;flex-direction:column;gap:20px;z-index:3;opacity:0;animation:slideUp 1s ease 1.2s forwards}
        .hero-social a{width:46px;height:46px;display:flex;align-items:center;justify-content:center;border:1px solid var(--glass-border);border-radius:50%;color:var(--white);text-decoration:none;transition:.3s;background:var(--glass-bg);backdrop-filter:blur(10px)}
        .hero-social a:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-3px);box-shadow:0 5px 20px rgba(200,168,78,.3)}
        .scroll-hint{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:slideUp 1s ease 1.4s forwards}
        .scroll-hint span{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(240,240,245,.4)}
        .scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2s ease-in-out infinite}
        @keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(.5)}50%{opacity:1;transform:scaleY(1)}}
        .hero-nav{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:18px;opacity:0;animation:slideUp 1s ease 1.1s forwards}
        .hero-nav a{display:flex;align-items:center;gap:8px;padding:12px 28px;border:1px solid var(--glass-border);border-radius:50px;text-decoration:none;color:var(--white);font-size:12px;letter-spacing:2px;text-transform:uppercase;transition:.3s;background:var(--glass-bg);backdrop-filter:blur(10px);font-family:'Orbitron',sans-serif}
        .hero-nav a:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-3px);box-shadow:0 8px 25px rgba(200,168,78,.2)}
        @media(max-width:768px){
            .hero-social{left:15px;bottom:70px;flex-direction:row;gap:12px}
            .hero-nav{flex-wrap:wrap;justify-content:center;gap:10px;bottom:80px;width:90%}
            .hero-nav a{padding:8px 16px;font-size:10px}
        }
    </style>
</head>
